<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    .glow {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 14px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(56, 189, 248, 0.12) 5%,
        rgba(56, 189, 248, 0.5) 20%,
        rgba(56, 189, 248, 0.85) 40%,
        #38bdf8 50%,
        rgba(56, 189, 248, 0.85) 60%,
        rgba(56, 189, 248, 0.5) 80%,
        rgba(56, 189, 248, 0.12) 95%,
        transparent 100%
      );
      box-shadow:
        0 0 40px 20px rgba(56, 189, 248, 0.4),
        0 0 100px 50px rgba(56, 189, 248, 0.25),
        0 0 200px 90px rgba(56, 189, 248, 0.12),
        0 0 360px 150px rgba(56, 189, 248, 0.05);
      animation: breathe 2.4s ease-in-out infinite;
    }
    .sidebar-right .glow {
      right: 0;
    }
    .sidebar-left .glow {
      left: 0;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.45; filter: brightness(0.8); }
      50% { opacity: 1; filter: brightness(1.3); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
</body>
</html>
