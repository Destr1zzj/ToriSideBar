<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    .glow {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(180deg,
        rgba(56, 189, 248, 0.0) 0%,
        rgba(56, 189, 248, 0.35) 8%,
        rgba(56, 189, 248, 0.75) 25%,
        rgba(56, 189, 248, 0.95) 45%,
        #38bdf8 50%,
        rgba(56, 189, 248, 0.95) 55%,
        rgba(56, 189, 248, 0.75) 75%,
        rgba(56, 189, 248, 0.35) 92%,
        rgba(56, 189, 248, 0.0) 100%
      );
      box-shadow:
        0 0 30px 12px rgba(56, 189, 248, 0.45),
        0 0 80px 36px rgba(56, 189, 248, 0.28),
        0 0 160px 64px rgba(56, 189, 248, 0.14),
        0 0 280px 100px rgba(56, 189, 248, 0.06);
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.5; filter: brightness(0.85); }
      50% { opacity: 1; filter: brightness(1.25); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
</body>
</html>
